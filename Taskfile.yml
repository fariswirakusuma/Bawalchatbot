version: '3'

vars:
  DIST_DIR: dist
  TARGET_BIN: '{{.DIST_DIR}}/chatbox_core'
  WWW_DIR: www/bawalchatbox
  MODEL_DIR: models
  MODEL_URL: '{{.MODEL_URL | default "https://huggingface.co/lmstudio-community/Meta-Llama-3-8B-Instruct-GGUF/resolve/main/Meta-Llama-3-8B-Instruct-Q4_K_M.gguf"}}'
  MODEL_FILE: '{{.MODEL_DIR}}/Meta-Llama-3-8B-Instruct-Q4_K_M.gguf'

tasks:
  default:
    desc: "Membangun seluruh ekosistem backend C++"
    cmds: 
      - task: build_backend

  help:
    desc: "Menampilkan daftar seluruh perintah (tasks) yang tersedia di project"
    cmds:
      - task --list

  build_backend:
    desc: "Mengompilasi Core Engine C++ via CMake"
    cmds:
      - cmake -S src -B {{.DIST_DIR}}
      - cmake --build {{.DIST_DIR}}
    status:
      - test -f {{.TARGET_BIN}}

  build_frontend:
    desc: "Mengompilasi dan bundling aset UI Web/App"
    dir: '{{.WWW_DIR}}'
    cmds:
      - npm install
      - npx tsc && npx vite build

  run_cli:
    desc: "Menjalankan Chatbox Engine interaktif langsung di terminal (Testing Mode)"
    deps: [build_backend]
    cmds:
      - ./{{.TARGET_BIN}} --cli

  run:
    desc: "Membuka Aplikasi Grafis Desktop (GUI Mode)"
    deps: [build_backend, build_frontend]
    cmds:
      - cd {{.WWW_DIR}} && npx electron . --no-sandbox --ozone-platform=x11 --disable-gpu

  dev:
    desc: "Menjalankan aplikasi dalam mode development"
    deps: [build_backend]
    cmds:
      - cd {{.WWW_DIR}} && npm install && npm run dev

  clean:
    desc: "Membersihkan seluruh cache biner hasil kompilasi"
    cmds:
      - rm -rf {{.DIST_DIR}}
      - rm -rf {{.WWW_DIR}}/dist-electron {{.WWW_DIR}}/dist